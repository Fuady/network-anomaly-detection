version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Network Anomaly Detection — Full Production Stack
#
#   api         : FastAPI detection service        → :8000
#   dashboard   : Streamlit real-time dashboard    → :8501
#   mlflow      : MLflow tracking server           → :5000
#   kafka       : Apache Kafka broker              → :9092
#   zookeeper   : Kafka dependency                 → :2181
#   prometheus  : Metrics scraper                  → :9090
#   grafana     : Metrics dashboard                → :3000
#
# Usage:
#   cd mlops/docker && docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Zookeeper (Kafka dependency) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      retries: 5

  # ── Kafka broker ────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      retries: 5

  # ── Kafka topic setup ────────────────────────────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - kafka
    command: >
      bash -c "
        sleep 10 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic network-kpis --partitions 6 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic anomaly-alerts --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic marketing-triggers --partitions 3 --replication-factor 1 &&
        echo 'Kafka topics created.'
      "
    restart: "no"

  # ── MLflow tracking server ────────────────────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    command: >
      bash -c "pip install mlflow==2.12.2 --quiet &&
               mlflow server --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlruns --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    restart: unless-stopped

  # ── FastAPI detection service ────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: mlops/docker/Dockerfile.api
    ports:
      - "8000:8000"
      - "8001:8001"    # Prometheus metrics
    volumes:
      - ../../data:/app/data
      - ../../configs:/app/configs
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - mlflow
      - kafka
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  # ── Streamlit dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../..
      dockerfile: mlops/docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../../data:/app/data
      - ../../configs:/app/configs
    depends_on:
      - api
    restart: unless-stopped

  # ── Streaming consumer ─────────────────────────────────────────────────────
  streaming:
    build:
      context: ../..
      dockerfile: mlops/docker/Dockerfile.streaming
    volumes:
      - ../../data:/app/data
      - ../../configs:/app/configs
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
      - api
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ../../mlops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../mlops/monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/anomaly.json
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mlflow_data:
  grafana_data:
